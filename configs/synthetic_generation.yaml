status: deferred
note: "Experimento B queda aplazado como trabajo futuro y no forma parte del alcance final actual. Esta configuracion no debe cargarse automaticamente por scripts principales."

model:
  base_model: stable-diffusion-v1-5/stable-diffusion-v1-5
  lora_path: models/lora/soybean_sd15
  trigger_word: soyseed
  device: cuda
  dtype: float16

comparison:
  target_classes:
    - intact
    - broken
  seeds:
