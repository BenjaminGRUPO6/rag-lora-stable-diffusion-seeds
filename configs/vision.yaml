model:
  architecture: resnet18
  pretrained: true
  num_classes: 5
training:
  image_size: 224
  batch_size: 16
  epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.0001
  early_stopping_patience: 5
  metric_to_optimize: macro_f1
  mixed_precision: true
outputs:
  checkpoint_dir: models/vision
  metrics_dir: results/vision
